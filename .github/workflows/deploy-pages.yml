name: Deploy Lumira no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Aguardar o deploy legado concorrente
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          for attempt in {1..60}; do
            state="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow pages-build-deployment \
              --commit "$GITHUB_SHA" \
              --limit 1 \
              --json status,conclusion \
              --jq '.[0] | if . == null then "pending" else "\(.status):\(.conclusion // "")" end')"

            case "$state" in
              completed:success)
                echo "Deploy legado concluído; publicando o artefato compilado por último."
                exit 0
                ;;
              completed:*)
                echo "Deploy legado terminou com estado $state; o artefato compilado pode prosseguir."
                exit 0
                ;;
            esac

            echo "Aguardando deploy legado do commit $GITHUB_SHA ($state, tentativa $attempt/60)."
            sleep 5
          done

          echo "::warning::O deploy legado não terminou em 5 minutos; prosseguindo com o artefato compilado."
      - id: deployment
        uses: actions/deploy-pages@v4
